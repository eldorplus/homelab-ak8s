apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ceph-homelab-tls
  namespace: rook-ceph
spec:
  secretName: ceph-homelab-tls
  dnsNames:
    - rook-ceph-rgw-homelab.rook-ceph.svc
    - rook-ceph-rgw-homelab.rook-ceph.svc.cluster.local
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: homelab
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
  dataPool:
    failureDomain: host
    # For production it is recommended to use more chunks, such as 4+2 or 8+4
    erasureCoded:
      dataChunks: 2
      codingChunks: 1
  preservePoolsOnDelete: false
  gateway:
    # annotations:
    #   metallb.universe.tf/loadBalancerIPs: 10.10.0.39
    sslCertificateRef: ceph-homelab-tls
    # caBundleRef: homelab
    #port: 80
    securePort: 443
    instances: 1
  # zone:
  #   name: zone-a
  # hosting:
  #   advertiseEndpoint:
  #     dnsName: s3.home.lab
  #     port: 443
  #     useTls: true
  #   dnsNames:
  #     - s3.home.lab
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
   name: rook-ceph-bucket
# Change "rook-ceph" provisioner prefix to match the operator namespace if needed
provisioner: rook-ceph.ceph.rook.io/bucket
reclaimPolicy: Delete
parameters:
  objectStoreName: homelab
  objectStoreNamespace: rook-ceph
---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: ceph-bucket
  namespace: default
spec:
  generateBucketName: ceph-bkt
  storageClassName: rook-ceph-bucket