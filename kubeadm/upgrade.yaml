- hosts: all
  gather_facts: no
  become: yes
  tasks:
  - name: k8s apt-key
    shell: |
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{k8s_repo_version}}/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg --yes
  - name: patch kube repo
    ansible.builtin.apt_repository:
      repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_repo_version }}/deb/ /"
      state: present
      filename: kubernetes
      update_cache: true
- hosts: master
  gather_facts: no
  become: yes
  serial: 1
  ignore_unreachable: true
  tasks:
  - name: install new kube packages
    shell: DEBIAN_FRONTEND=noninteractive apt-get install -yq --allow-change-held-packages --allow-downgrades kubeadm="{{ k8s_version }}-1.1" kubelet="{{ k8s_version }}-1.1" kubectl="{{ k8s_version }}-1.1"
  - name: hold k8s
    dpkg_selections:
      name: "{{ item }}"
      selection: hold
    with_items:
    - kubelet
    - kubeadm
    - kubectl
  - name: upgrade kubeadm
    shell: kubeadm upgrade apply v{{ k8s_version }} -y
    ignore_errors: true
  - name: localaction-drain {{ inventory_hostname }}
    become: false
    local_action: ansible.builtin.command kubectl drain {{ inventory_hostname }} --ignore-daemonsets --disable-eviction
    ignore_errors: true
  - name: restart kubelet
    systemd:
      name: kubelet
      state: restarted
      daemon_reload: yes
  - name: localaction-uncordon {{ inventory_hostname }}
    become: false
    local_action: ansible.builtin.command kubectl uncordon {{ inventory_hostname }}
    ignore_errors: true
- hosts: workers
  gather_facts: no
  become: yes
  serial: 1
  ignore_unreachable: true
  tasks:
  - name: install new kube packages
    shell: DEBIAN_FRONTEND=noninteractive apt-get install -yq --allow-change-held-packages --allow-downgrades kubeadm="{{ k8s_version }}-1.1" kubectl="{{ k8s_version }}-1.1" kubelet="{{ k8s_version }}-1.1"
  - name: upgrade kubeadm
    shell: kubeadm upgrade node
    ignore_errors: true
  # - name: localaction-drain {{ inventory_hostname }}
  #   become: false
  #   local_action: ansible.builtin.command kubectl drain {{ inventory_hostname }} --ignore-daemonsets --delete-emptydir-data --disable-eviction
  #   ignore_errors: true
  - name: restart kubelet
    systemd:
      name: kubelet
      state: restarted
      daemon_reload: yes
  - name: localaction-uncordon {{ inventory_hostname }}
    become: false
    local_action: ansible.builtin.command kubectl uncordon {{ inventory_hostname }}
    ignore_errors: true
# upgrade calico operator
- hosts: localhost
  gather_facts: no
  environment:
    KUBECONFIG: "{{ kubeconf | default('/Users/ysung/.kube/config')}}"
  tasks:
  - name: download calico operator
    ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
      dest: /tmp/tigera-operator.yaml
      mode: '0664'
  - name: apply tigera-operator
    kubernetes.core.k8s:
      state: present
      src: /tmp/tigera-operator.yaml
      server_side_apply:
        field_manager: ansible
        force_conflicts: true