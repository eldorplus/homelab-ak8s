apiVersion: v1
kind: Namespace
metadata:
  name: gitlab-system
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: operatorgroup
  namespace: gitlab-system
spec:
  targetNamespaces:
  - gitlab-system
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: my-gitlab-operator
  namespace: gitlab-system
spec:
  channel: stable
  name: gitlab-operator-kubernetes
  source: operatorhubio-catalog
  sourceNamespace: olm